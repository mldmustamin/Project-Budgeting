title: FundManager V2 — Engineering Blog
description: Budget management for field engineering — Kotlin/Compose + Laravel 11
theme: minima

collections:
  blog:
    output: true
    permalink: /blog/:name

defaults:
  - scope:
      path: ""
      type: blog
    values:
      layout: default

markdown: kramdown
kramdown:
  parse_block_html: true
