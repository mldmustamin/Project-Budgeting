<style>
/* ponytail: Obsidian dark theme, card layout, callout boxes — one file for all pages */

:root { color-scheme: dark; }
body {
  background: #1e1e1e; color: #dcddde; font-family: Inter, system-ui, -apple-system, sans-serif;
  font-size: 14.5px; line-height: 1.6; max-width: 920px; margin: 0 auto; padding: 1.5rem 1.25rem;
}

/* links */
a { color: #9b87f5; text-decoration: none; }
a:hover { text-decoration: underline; }

/* headings */
h1, h2, h3, h4 { color: #dcddde; font-weight: 600; }
h1 { font-size: 1.6em; border-bottom: 1px solid #363636; padding-bottom: .3em; margin-top: 0; }
h2 { font-size: 1.25em; border-bottom: 1px solid #363636; padding-bottom: .35em; margin-top: 1.5em; }
h3 { font-size: 1.05em; margin-top: 1.2em; }

/* cards — wrap sections */
.card {
  background: #262626; border: 1px solid #363636; border-radius: 8px;
  padding: 20px; margin-bottom: 24px;
}

/* callout boxes — Obsidian-style */
.callout {
  border-radius: 0 6px 6px 0; padding: 12px 14px; margin: 1em 0; font-size: .92em;
  position: relative;
}
.callout::before { font-weight: 700; font-size: .78em; text-transform: uppercase; letter-spacing: .04em; display: block; margin-bottom: 4px; }
.callout.summary { border-left: 3px solid #5b9bd5; background: rgba(91,155,213,.06); }
.callout.summary::before { content: "ℹ SUMMARY"; color: #5b9bd5; }
.callout.important { border-left: 3px solid #e0a458; background: rgba(224,164,88,.06); }
.callout.important::before { content: "⚠ IMPORTANT"; color: #e0a458; }
.callout.danger { border-left: 3px solid #e06c5c; background: rgba(224,108,92,.06); }
.callout.danger::before { content: "⛔ DANGER"; color: #e06c5c; }

/* tables */
table { width: 100%; border-collapse: collapse; margin: 1em 0; font-size: .9em; }
thead th {
  background: #1a1a1a; color: #8b8b8b; font-size: .75em; text-transform: uppercase;
  letter-spacing: .04em; font-weight: 600; padding: 8px 10px; text-align: left;
  border-bottom: 1px solid #363636;
}
tbody td { padding: 8px 10px; border-bottom: 1px solid #363636; vertical-align: top; }
tbody tr:hover { background: #2a2a2a; transition: background .12s; }
tbody tr:last-child td { border-bottom: none; }

/* role badges */
.role-badge {
  display: inline-block; padding: 2px 8px; border-radius: 10px;
  font-size: .72em; font-weight: 600; letter-spacing: .03em;
}
.role-owner { background: rgba(155,135,245,.15); color: #9b87f5; }
.role-admin { background: rgba(91,155,213,.15); color: #5b9bd5; }
.role-fm { background: rgba(224,164,88,.15); color: #e0a458; }
.role-sup { background: rgba(107,207,151,.15); color: #6fcf97; }
.role-fe { background: rgba(111,207,151,.15); color: #6fcf97; }
.role-auditor { background: rgba(139,139,139,.12); color: #8b8b8b; }

/* inline code */
code {
  font-family: SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
  background: #2d2d2d; padding: 2px 6px; border-radius: 4px; font-size: .88em;
  color: #e0a458;
}
pre {
  background: #161616; border: 1px solid #363636; border-radius: 6px;
  padding: 16px; overflow-x: auto; font-size: .85em; line-height: 1.5;
}
pre code { background: none; padding: 0; color: #7fdbca; }

/* ASCII diagram (terminal green) */
pre:has(code.language-plaintext) code { color: #7fdbca; }

blockquote {
  border-left: 3px solid #5b9bd5; margin: 1em 0; padding: .5em 1em;
  background: rgba(91,155,213,.06); color: #8b8b8b; border-radius: 0 6px 6px 0;
}

hr { border: none; border-top: 1px solid #363636; margin: 2em 0; }

/* list bullets */
ul { padding-left: 1.5em; }
li { margin-bottom: .3em; }
li::marker { color: #9b87f5; }

/* ToC — sticky right sidebar, desktop only */
.toc {
  position: fixed; right: max(20px, calc((100vw - 940px) / 2 - 220px));
  top: 80px; width: 180px; font-size: .78em; line-height: 1.8;
  background: #262626; border: 1px solid #363636; border-radius: 8px;
  padding: 14px; z-index: 10; display: none;
}
@media (min-width: 1200px) { .toc { display: block; } }
.toc a { display: block; color: #8b8b8b; }
.toc a:hover { color: #9b87f5; text-decoration: none; }
.toc strong { color: #dcddde; font-size: .85em; }

/* back button */
.back-link { display: inline-block; margin-bottom: 1em; font-size: .85em; color: #8b8b8b; }
.back-link:hover { color: #9b87f5; }

/* responsive */
@media (max-width: 600px) {
  body { padding: 1rem .75rem; font-size: 14px; }
  .card { padding: 14px; }
  table { display: block; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; }
  .toc { display: none; }
}

/* site header/footer overrides for minima */
.site-header { border: none; border-bottom: 1px solid #363636; }
.site-footer { border: none; border-top: 1px solid #363636; }
.site-title, .site-title:visited { color: #dcddde; }
.site-nav .page-link { color: #8b8b8b; }
.site-nav .page-link:hover { color: #9b87f5; }
</style>
